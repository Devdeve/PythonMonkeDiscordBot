services:
  - type: worker
    name: python-monke-discord-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_PREFIX
        value: "!"
      - key: DISCORD_OWNER_ID
        sync: false
